<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>NextConsole 移动端演示</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: linear-gradient(145deg, #0f0c29, #1a1a3e, #24243e);
      color: #e0e0e0;
      padding: var(--safe-top) 0 var(--safe-bottom);
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 40px 20px 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(88,166,255,0.12) 0%, transparent 100%);
    }
    .header h1 {
      font-size: 24px;
      background: linear-gradient(135deg, #58a6ff, #79c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .header p { font-size: 13px; color: #8b949e; }

    /* Chat mockup */
    .chat-container {
      padding: 12px 16px;
      padding-bottom: 80px;
    }
    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.6;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-user {
      background: #2563eb;
      color: #fff;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .chat-ai {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }
    .chat-ai .typing {
      display: inline-block;
    }
    .chat-ai .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #58a6ff;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* 底部操作栏 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 12, 41, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 12px calc(10px + var(--safe-bottom));
      z-index: 100;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
    }
    .input-row input:focus { border-color: #58a6ff; }
    .input-row input::placeholder { color: #64748b; }
    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #2563eb;
      border: none;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .send-btn:active { background: #1d4ed8; }

    /* 快捷操作按钮 */
    .actions {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }
    .actions::-webkit-scrollbar { display: none; }
    .action-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      color: #94a3b8;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
    }
    .action-btn:active { background: rgba(255,255,255,0.12); color: #e2e8f0; }

    /* 网络状态指示器 */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px;
      font-size: 11px;
      color: #64748b;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 4px;
    }

    /* 通知卡片 */
    .notify-card {
      margin: 0 16px 12px;
      padding: 12px 14px;
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: 12px;
      font-size: 13px;
      color: #93c5fd;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notify-card .icon { font-size: 18px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🤖 AI Chat Demo</h1>
    <p>NextConsole 移动端调试演示 · 点击右下 NC 按钮</p>
  </div>

  <div class="status-bar">
    <span><span class="status-dot"></span>已连接</span>
    <span>模型: GPT-4o</span>
    <span id="log-count">日志: 0</span>
  </div>

  <div class="notify-card">
    <span class="icon">💡</span>
    <span>拖拽 NC 按钮可移动位置，点击打开调试面板。下方按钮可触发各类测试。</span>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="bottom-bar">
    <div class="input-row">
      <input type="text" id="user-input" placeholder="输入消息..." enterkeyhint="send" />
      <button class="send-btn" id="send-btn">➤</button>
    </div>
    <div class="actions">
      <div class="action-btn" data-action="stream">🤖 AI 流式</div>
      <div class="action-btn" data-action="fetch">🌐 网络请求</div>
      <div class="action-btn" data-action="error">❌ 模拟报错</div>
      <div class="action-btn" data-action="storage">💾 写入存储</div>
      <div class="action-btn" data-action="sse">📡 SSE</div>
      <div class="action-btn" data-action="ws">🔌 WebSocket</div>
      <div class="action-btn" data-action="burst">⚡ 压力测试</div>
      <div class="action-btn" data-action="element">🌲 DOM 树</div>
      <div class="action-btn" data-action="system">📊 系统信息</div>
      <div class="action-btn" data-action="source">📄 Source</div>
      <div class="action-btn" data-action="perf">🏎️ Perf</div>
      <div class="action-btn" data-action="repl">⌨️ REPL</div>
      <div class="action-btn" data-action="plugin">🧩 插件测试</div>
      <div class="action-btn" data-action="all">🔥 全部测试</div>
      <div class="action-btn" data-action="clear">🧹 清空</div>
    </div>
  </div>

  <script type="module">
    import NextConsole from '../src/index.ts';
    import { createSourcePlugin } from '../src/plugins/source-plugin.ts';
    import { createPerformancePlugin } from '../src/plugins/performance-plugin.ts';

    const nc = new NextConsole({
      defaultTab: 'console',
      panelHeight: 0.45,
      buttonPosition: { x: window.innerWidth - 64, y: window.innerHeight - 160 },
    });
    nc.use(createSourcePlugin()).use(createPerformancePlugin());
    window.nc = nc;

    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const logCountEl = document.getElementById('log-count');
    let logCount = 0;

    function updateLogCount() {
      logCount++;
      logCountEl.textContent = `日志: ${logCount}`;
    }

    // ========== 聊天 UI ==========
    function addUserBubble(text) {
      const div = document.createElement('div');
      div.className = 'chat-bubble chat-user';
      div.textContent = text;
      chat.appendChild(div);
      scrollToBottom();
      console.log(`[用户] ${text}`);
      updateLogCount();
    }

    function addAIBubble() {
      const div = document.createElement('div');
      div.className = 'chat-bubble chat-ai';
      div.innerHTML = '<span class="typing"></span><span class="cursor"></span>';
      chat.appendChild(div);
      scrollToBottom();
      return div;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      });
    }

    // ========== AI 流式回复 ==========
    const AI_RESPONSES = [
      '你好！我是 AI 助手，很高兴为你服务。这段文字是通过流式输出实时渲染的，你可以在 NextConsole 的 Console 面板中看到对应的流式日志条目（左侧有蓝色边框标记）。',
      '移动端调试一直是前端开发的痛点。NextConsole 针对触屏交互进行了优化：浮动按钮支持拖拽和边缘吸附，面板支持手势调整高度，虚拟列表确保万级日志下依然流畅。',
      '关于 AI 流式输出的技术实现：我们使用 requestAnimationFrame 批量合并 DOM 更新，避免了高频率 token 推送导致的 UI 卡顿。同时 appendStream API 支持按 streamId 将多个 chunk 合并为同一条日志。',
      '你可以试试下面的快捷按钮：\n• 🌐 网络请求 — 查看 fetch/XHR 拦截\n• ❌ 模拟报错 — 测试错误捕获和堆栈\n• 💾 写入存储 — 查看 Storage 面板\n• ⚡ 压力测试 — 1000 条日志压测',
      '代码质量方面，NextConsole 使用 Shadow DOM 实现完全隔离，不会污染宿主页面的样式和 DOM。销毁时会恢复所有被拦截的原生 API（console、fetch、XHR、EventSource）。',
    ];

    async function streamReply(text) {
      const bubble = addAIBubble();
      const typingEl = bubble.querySelector('.typing');
      const cursorEl = bubble.querySelector('.cursor');
      const streamId = `chat-${Date.now()}`;

      console.info(`[AI] 开始流式回复 (streamId: ${streamId})`);
      updateLogCount();

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        typingEl.textContent += char;
        nc.appendStream(streamId, char);
        scrollToBottom();
        // 模拟不均匀的 token 速度
        const delay = char === '\n' ? 100 : char === '。' || char === '！' ? 60 : 20 + Math.random() * 25;
        await sleep(delay);
      }

      cursorEl.remove();
      nc.endStream(streamId);
      console.log(`[AI] 回复完成，共 ${text.length} 字`);
      updateLogCount();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ========== 发送消息 ==========
    let replyIndex = 0;
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addUserBubble(text);
      await sleep(400);
      const reply = AI_RESPONSES[replyIndex % AI_RESPONSES.length];
      replyIndex++;
      await streamReply(reply);
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ========== 快捷操作 ==========
    document.querySelector('.actions').addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;

      switch (action) {
        case 'stream': {
          addUserBubble('来一段 AI 流式回复');
          await sleep(300);
          await streamReply(AI_RESPONSES[replyIndex++ % AI_RESPONSES.length]);
          break;
        }

        case 'fetch': {
          console.info('⏳ 发起网络请求...');
          updateLogCount();
          try {
            const [r1, r2] = await Promise.all([
              fetch('https://jsonplaceholder.typicode.com/posts/1').then(r => r.json()),
              fetch('https://jsonplaceholder.typicode.com/users/1').then(r => r.json()),
            ]);
            console.log('📥 GET /posts/1:', r1);
            console.log('📥 GET /users/1:', r2);
            updateLogCount(); updateLogCount();

            await fetch('https://jsonplaceholder.typicode.com/posts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title: '测试', body: 'NextConsole POST 测试', userId: 1 }),
            });
            console.log('📤 POST /posts 完成');
            updateLogCount();

            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://jsonplaceholder.typicode.com/todos/1');
            xhr.onload = () => {
              console.log('📡 XHR /todos/1:', JSON.parse(xhr.responseText));
              updateLogCount();
            };
            xhr.send();
          } catch (err) {
            console.error('网络请求失败:', err);
            updateLogCount();
          }

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '✅ 已发起多个网络请求，切换到 Network 面板查看详情';
          break;
        }

        case 'error': {
          console.error('❌ 模拟的 JavaScript 错误', new Error('Something went wrong!'));
          console.warn('⚠️ 这是一条警告信息', { code: 'ERR_DEMO', ts: Date.now() });
          console.error('❌ 类型错误', new TypeError('Cannot read property "x" of undefined'));
          updateLogCount(); updateLogCount(); updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '⚠️ 已生成错误日志，在 Console 面板中查看红色/黄色条目';
          break;
        }

        case 'storage': {
          localStorage.setItem('nc_user_prefs', JSON.stringify({
            theme: 'dark', lang: 'zh-CN', fontSize: 14, notifications: true,
          }));
          localStorage.setItem('nc_chat_history', JSON.stringify([
            { role: 'user', content: '你好' },
            { role: 'assistant', content: '你好！有什么可以帮你的？' },
          ]));
          sessionStorage.setItem('nc_session_token', 'tok_' + Math.random().toString(36).slice(2));
          document.cookie = `nc_visit=${Date.now()}; path=/; max-age=3600`;
          console.log('💾 已写入 localStorage × 2, sessionStorage × 1, Cookie × 1');
          updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '✅ 存储数据已写入，切换到 Storage 面板查看和编辑';
          break;
        }

        case 'sse': {
          console.info('📡 开始 SSE 连接...');
          updateLogCount();
          const evtSource = new EventSource('http://localhost:3210/sse');
          let sseCount = 0;
          const sseStreamId = `sse-${Date.now()}`;

          evtSource.onopen = () => {
            console.log('📡 SSE 连接已建立');
            updateLogCount();
          };
          evtSource.addEventListener('done', (event) => {
            evtSource.close();
            nc.endStream(sseStreamId);
            console.info(`📡 SSE 完成，共接收 ${sseCount} 条事件`, JSON.parse(event.data));
            updateLogCount();
          });
          // Listen to all named events
          ['connected','user_login','order_created','notification','chat_message','data_sync','heartbeat','user_logout'].forEach(evtName => {
            evtSource.addEventListener(evtName, (event) => {
              sseCount++;
              const data = JSON.parse(event.data);
              nc.appendStream(sseStreamId, `[${evtName}] ${event.data}\n`);
              console.log(`📡 SSE #${sseCount} [${evtName}]:`, data);
              updateLogCount();
            });
          });
          evtSource.onerror = () => {
            evtSource.close();
            console.warn('📡 SSE 服务不可用，请先启动: node examples/server.js');
            updateLogCount();
            // Fallback mock
            (async () => {
              const mockId = `sse-mock-${Date.now()}`;
              const mockData = [
                { event: 'connected', data: { status: 'ok', server: 'mock' } },
                { event: 'user_login', data: { userId: 'u_12345', name: '张三' } },
                { event: 'order_created', data: { orderId: 'ORD-001', amount: 299.9 } },
                { event: 'notification', data: { title: '通知', body: '服务器负载正常' } },
                { event: 'chat_message', data: { from: 'Alice', text: '下午开会' } },
              ];
              for (let i = 0; i < mockData.length; i++) {
                await sleep(600);
                nc.appendStream(mockId, `[${mockData[i].event}] ${JSON.stringify(mockData[i].data)}\n`);
                console.log(`📡 SSE 模拟 #${i + 1} [${mockData[i].event}]:`, mockData[i].data);
                updateLogCount();
              }
              nc.endStream(mockId);
              console.info('📡 SSE 模拟完成，共 5 条事件');
              updateLogCount();
            })();
          };

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '📡 SSE 测试已启动，查看 Console 面板的流式日志和 Network 面板的 SSE 记录';
          break;
        }

        case 'ws': {
          console.info('🔌 开始 WebSocket 连接...');
          updateLogCount();
          let ws;
          try {
            ws = new WebSocket('ws://localhost:3210/ws');
          } catch (e) {
            ws = null;
          }

          const wsStreamId = `ws-${Date.now()}`;
          let wsConnected = false;

          const runMockWs = async () => {
            console.warn('🔌 WebSocket 服务不可用，请先启动: node examples/server.js');
            updateLogCount();
            const mockMsgs = [
              { type: 'auth', payload: { userId: 'u_12345', token: 'bearer_xxx' } },
              { type: 'chat', payload: { from: 'Alice', text: '在吗？' } },
              { type: 'chat', payload: { from: 'Bob', text: '在的，什么事？' } },
              { type: 'notification', payload: { title: '系统通知', body: '您的订单已发货' } },
              { type: 'ping', payload: { ts: Date.now() } },
              { type: 'chat', payload: { from: 'Alice', text: '收到，谢谢！' } },
              { type: 'close', payload: { reason: '会话结束' } },
            ];
            for (let i = 0; i < mockMsgs.length; i++) {
              await sleep(500 + Math.random() * 400);
              const msg = mockMsgs[i];
              const text = JSON.stringify(msg);
              nc.appendStream(wsStreamId, `← ${text}\n`);
              console.log(`🔌 WS 收到 [${msg.type}]:`, msg.payload);
              updateLogCount();
            }
            nc.endStream(wsStreamId);
            console.info('🔌 WebSocket 模拟完成，共 7 条消息');
            updateLogCount();
          };

          if (ws) {
            const wsTimeout = setTimeout(() => {
              if (!wsConnected) {
                ws.close();
                runMockWs();
              }
            }, 3000);

            ws.onopen = () => {
              wsConnected = true;
              clearTimeout(wsTimeout);
              console.log('🔌 WebSocket 已连接');
              updateLogCount();
              // Send test messages
              const testMsgs = [
                JSON.stringify({ action: 'ping' }),
                JSON.stringify({ action: 'get_users' }),
                'Hello NextConsole!',
                '测试中文消息',
              ];
              testMsgs.forEach((msg, i) => {
                setTimeout(() => {
                  if (ws.readyState === 1) {
                    ws.send(msg);
                    nc.appendStream(wsStreamId, `→ ${msg}\n`);
                    console.log(`🔌 WS 发送:`, msg);
                    updateLogCount();
                  }
                }, (i + 1) * 1000);
              });
              setTimeout(() => {
                if (ws.readyState === 1) ws.close();
                nc.endStream(wsStreamId);
                console.info('🔌 WebSocket 已关闭');
                updateLogCount();
              }, 8000);
            };
            ws.onmessage = (event) => {
              nc.appendStream(wsStreamId, `← ${event.data}\n`);
              console.log('🔌 WS 收到:', event.data);
              updateLogCount();
            };
            ws.onerror = () => {
              clearTimeout(wsTimeout);
              if (!wsConnected) runMockWs();
            };
          } else {
            runMockWs();
          }

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '🔌 WebSocket 测试已启动，→ 为发送，← 为接收，查看 Console 流式日志';
          break;
        }

        case 'burst': {
          console.info('⚡ 开始压力测试: 1000 条日志...');
          updateLogCount();
          const t0 = performance.now();
          for (let i = 0; i < 1000; i++) {
            const levels = ['log', 'info', 'warn', 'error', 'debug'];
            console[levels[i % 5]](`[#${i}]`, { index: i, random: Math.random().toFixed(4), ts: Date.now() });
          }
          const elapsed = (performance.now() - t0).toFixed(1);
          logCount += 1000;
          logCountEl.textContent = `日志: ${logCount}`;
          console.log(`✅ 1000 条日志完成，耗时 ${elapsed}ms`);
          updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = `⚡ 压力测试完成！1000 条日志写入耗时 ${elapsed}ms。面板应保持流畅滚动。`;
          break;
        }

        case 'clear': {
          nc.clearConsole();
          nc.clearNetwork();
          logCount = 0;
          logCountEl.textContent = '日志: 0';
          chat.innerHTML = '';
          replyIndex = 0;
          console.log('🧹 已清空所有日志和聊天记录');
          updateLogCount();
          break;
        }

        case 'element': {
          // Create some test DOM to inspect
          const testDiv = document.createElement('div');
          testDiv.id = 'test-element-demo';
          testDiv.innerHTML = `
            <section class="demo-section">
              <h3>动态生成的 DOM 结构</h3>
              <ul>
                <li data-id="1">列表项 1 <span class="badge">new</span></li>
                <li data-id="2">列表项 2</li>
                <li data-id="3">列表项 3 <a href="#">链接</a></li>
              </ul>
              <div class="nested">
                <p>嵌套段落 <strong>加粗文字</strong> <em>斜体文字</em></p>
                <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="1px" width="1" height="1" />
              </div>
            </section>
          `;
          document.body.insertBefore(testDiv, document.querySelector('.bottom-bar'));
          console.log('🌲 已创建测试 DOM 结构，切换到 Element 面板查看');
          updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '🌲 已生成测试 DOM，切换到 Element 面板可查看 DOM 树、悬浮高亮元素';
          break;
        }

        case 'system': {
          console.log('📊 系统信息测试 — 切换到 System 面板查看');
          console.info('📊 当前信息:', {
            screen: `${screen.width}×${screen.height}`,
            viewport: `${innerWidth}×${innerHeight}`,
            dpr: devicePixelRatio,
            language: navigator.language,
            cookieEnabled: navigator.cookieEnabled,
            onLine: navigator.onLine,
            hardwareConcurrency: navigator.hardwareConcurrency,
            maxTouchPoints: navigator.maxTouchPoints,
          });
          updateLogCount(); updateLogCount();

          // Trigger some performance entries
          performance.mark('nc-test-start');
          let sum = 0;
          for (let i = 0; i < 1e6; i++) sum += Math.random();
          performance.mark('nc-test-end');
          performance.measure('nc-test-compute', 'nc-test-start', 'nc-test-end');
          const measure = performance.getEntriesByName('nc-test-compute')[0];
          console.log(`📊 计算耗时: ${measure.duration.toFixed(2)}ms (100万次随机数求和)`);
          updateLogCount();

          nc.show();
          // Switch to system tab
          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '📊 切换到 System 面板查看 UA、屏幕、设备内存、性能指标等系统信息';
          break;
        }

        case 'source': {
          // Add some inline script/style for testing
          const testStyle = document.createElement('style');
          testStyle.textContent = '.source-test-class { color: #58a6ff; font-weight: bold; }';
          document.head.appendChild(testStyle);

          const testScript = document.createElement('script');
          testScript.textContent = 'window.__sourcePluginTest = "Source plugin works!";';
          document.head.appendChild(testScript);

          console.log('📄 已添加测试内联样式和脚本');
          console.info('📄 切换到 Source 面板查看所有页面资源（外部引用 & 内联）');
          updateLogCount(); updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '📄 Source 插件可查看页面所有脚本/样式资源，点击可查看完整源码';
          break;
        }

        case 'perf': {
          console.log('🏎️ Performance 插件测试');
          updateLogCount();

          // Generate some resource loading for profiling
          performance.mark('nc-perf-test');
          const img = new Image();
          img.src = `https://picsum.photos/200/200?r=${Math.random()}`;
          img.onload = () => {
            console.log('🏎️ 测试图片加载完成');
            updateLogCount();
          };
          img.onerror = () => {
            console.warn('🏎️ 测试图片加载失败（网络问题），但 Perf 面板仍可查看其他资源');
            updateLogCount();
          };

          // Simulate some work to generate long task entries
          const heavy = () => {
            const t = performance.now();
            while (performance.now() - t < 80) { Math.random(); }
          };
          heavy();

          console.info('🏎️ 切换到 Perf 面板查看核心指标、资源分布、长任务检测');
          updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '🏎️ Perf 插件展示 TTFB/FCP/FP/堆内存等指标，资源按类型分布，支持添加自定义 Mark';
          break;
        }

        case 'repl': {
          console.log('⌨️ REPL 测试 — 切换到 REPL 面板');
          console.info('⌨️ 在 REPL 面板中可以执行任意 JavaScript，试试以下命令:');
          console.log('  document.title');
          console.log('  navigator.userAgent');
          console.log('  performance.now()');
          console.log('  nc.getLogEntries().length');
          console.log('  JSON.stringify({a:1, b:[2,3]})');
          updateLogCount(); updateLogCount(); updateLogCount(); updateLogCount(); updateLogCount(); updateLogCount();

          // Pre-populate some global test vars
          window.__replTestData = {
            name: 'NextConsole REPL 测试',
            items: [1, 2, 3, { nested: true }],
            fn: function hello() { return 'Hello from REPL!'; }
          };
          console.log('⌨️ 已设置 window.__replTestData，在 REPL 中输入 __replTestData 查看');
          updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '⌨️ 切换到 REPL 面板，输入 JS 代码执行。支持↑/↓浏览历史，试试 __replTestData';
          break;
        }

        case 'plugin': {
          console.log('🧩 插件系统测试');
          updateLogCount();

          // Register a custom plugin on the fly
          nc.use({
            name: 'demo-plugin',
            version: '1.0.0',
            tab: {
              label: 'Demo',
              render(container, api) {
                container.innerHTML = `
                  <div style="padding:16px;color:var(--nc-text);">
                    <h3 style="color:var(--nc-accent);margin-bottom:12px;">🧩 自定义插件 Demo</h3>
                    <p style="margin-bottom:8px;color:var(--nc-text-secondary);font-size:12px;">
                      这是一个通过 <code>nc.use()</code> 动态注册的插件面板。
                    </p>
                    <div style="margin-bottom:12px;">
                      <button id="demo-plugin-log" style="padding:6px 12px;background:var(--nc-accent);border:none;color:#fff;border-radius:4px;cursor:pointer;margin-right:6px;font-size:12px;">通过插件 API 打印日志</button>
                      <button id="demo-plugin-count" style="padding:6px 12px;background:var(--nc-bg-secondary);border:1px solid var(--nc-border);color:var(--nc-text);border-radius:4px;cursor:pointer;font-size:12px;">查看日志数量</button>
                    </div>
                    <div id="demo-plugin-output" style="padding:10px;background:var(--nc-bg-secondary);border:1px solid var(--nc-border);border-radius:4px;font-size:12px;color:var(--nc-info);min-height:40px;">
                      等待操作...
                    </div>
                  </div>
                `;
                const output = container.querySelector('#demo-plugin-output');
                container.querySelector('#demo-plugin-log').addEventListener('click', () => {
                  api.log('🧩 来自插件的日志', { time: new Date().toLocaleTimeString(), random: Math.random() });
                  output.textContent = '✅ 已通过 api.log() 打印日志，切换到 Console 面板查看';
                });
                container.querySelector('#demo-plugin-count').addEventListener('click', () => {
                  const count = api.consoleCore.getEntries().length;
                  output.textContent = `📊 当前共有 ${count} 条日志`;
                });
              },
              destroy() {},
            },
            init(api) {
              api.addStyle('#demo-plugin-log:hover { opacity: 0.85; }');
              api.log('🧩 Demo 插件已初始化');
            },
          });

          console.info('🧩 已注册 Demo 插件，面板标签栏新增了 "Demo" 标签');
          updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '🧩 已动态注册自定义插件！滑到标签栏最右侧找到 "Demo" 标签。内置的 Source 和 Perf 插件也已加载。';
          break;
        }

        case 'all': {
          console.log('🔥 开始全功能测试...');
          updateLogCount();

          const bubble = addAIBubble();
          bubble.querySelector('.cursor').remove();
          bubble.querySelector('.typing').textContent = '🔥 依次执行所有测试，请稍候...';

          const actions = ['storage', 'error', 'fetch', 'element', 'source', 'perf', 'repl', 'plugin'];
          for (let i = 0; i < actions.length; i++) {
            await sleep(300);
            const btn = document.querySelector(`[data-action="${actions[i]}"]`);
            if (btn) btn.click();
          }

          await sleep(500);
          // Trigger stream last
          addUserBubble('全功能测试完成！');
          await sleep(300);
          await streamReply('🎉 所有功能测试完成！\n\n✅ Console — 日志捕获、错误/警告堆栈\n✅ Network — Fetch/XHR 拦截\n✅ Storage — localStorage/sessionStorage/Cookie\n✅ Element — DOM 树查看\n✅ System — 系统信息\n✅ REPL — JS 命令执行\n✅ Source — 源码查看插件\n✅ Perf — 性能分析插件\n✅ Plugin — 自定义插件注册\n\n你可以逐个面板查看各项功能的测试结果。');
          break;
        }
      }
    });

    // ========== 初始欢迎 ==========
    (async () => {
      await sleep(500);
      console.log('📱 移动端页面已加载', {
        screen: `${screen.width}×${screen.height}`,
        viewport: `${innerWidth}×${innerHeight}`,
        dpr: devicePixelRatio,
        ua: navigator.userAgent.slice(0, 60),
      });
      updateLogCount();

      await streamReply('欢迎来到 NextConsole 移动端演示！👋\n\n试试输入消息或点击下方快捷按钮。我会以流式方式回复，所有交互日志都会被捕获到调试面板中。');
    })();
  </script>
</body>
</html>
